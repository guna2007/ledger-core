
application.yml:
spring:
  application:
    name: smartbank-management-system

  # Database Configuration
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/smart_bank}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true      
    properties:
      hibernate:
       format_sql: true  
      dialect: org.hibernate.dialect.MySQLDialect


  mail:
   host: ${SMTP_HOST:smtp.gmail.com}
   port: ${SMTP_PORT:587}
   username: ${SMTP_USERNAME:dev@smartbank.com}
   password: ${SMTP_PASSWORD:dev}
   properties:
    mail:
     smtp:
       auth: true
       starttls:
         enable: true

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:SmartBankDevSecretKey2024ForJWTTokenGeneration}
  expiration: ${JWT_EXPIRATION_MS:86400000}

server:
  port: ${PORT:8080}

logging:
   level:
     root: INFO
     com.bank.smartbank: DEBUG  # Your package logs at DEBUG level
     org.springframework.security: DEBUG  # Security logs
     org.hibernate.SQL: DEBUG  # SQL queries
   pattern:
     console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
   file:
      name: logs/smart-bank.log