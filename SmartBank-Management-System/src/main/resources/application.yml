spring:
  application:
    name: smart-bank

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/smart_bank}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:dev@smartbank.com}
    password: ${SMTP_PASSWORD:dev}
    properties:
      mail:
        debug: true
        smtp:
          auth: true
          starttls:
            enable: true

  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: ${PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework

jwt:
  secret: ${JWT_SECRET:SmartBankDevSecretKey2024ForJWTTokenGeneration}
  expiration: ${JWT_EXPIRATION_MS:86400000}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging:
  level:
    root: INFO
    com.bank.smartbank: DEBUG
    org.springframework.mail: DEBUG
    org.eclipse.angus.mail: DEBUG
    com.sun.mail: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
